<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 100" fill="currentColor">
  <!--
    7 pillars  w=16  gap=4 (25% ratio — monolithic mass)
    Center at x=90, pillars bottom at y=86
    Plinth: full width, h=6
    Gate: w=12 in center pillar (2px walls), height=53% of center pillar
    Signal lines: 3 per flank, all outside plinth edges
  -->
  <path fill-rule="evenodd" d="
    M22,62  h16 v24 h-16 Z
    M42,50  h16 v36 h-16 Z
    M62,34  h16 v52 h-16 Z
    M82,18  h16 v68 h-16 Z
    M102,34 h16 v52 h-16 Z
    M122,50 h16 v36 h-16 Z
    M142,62 h16 v24 h-16 Z
    M22,86  h136 v6  h-136 Z
    M84,86 L84,63 C84,50 87,49 90,49 C93,49 96,50 96,63 L96,86 Z
  "/>
  <!-- Signal lines — left flank (inner→outer, heights descend outward) -->
  <rect x="17.5" y="72" width="2" height="13"/>
  <circle cx="18.5" cy="70.5" r="1.5"/>
  <rect x="11.5" y="76" width="2" height="9"/>
  <circle cx="12.5" cy="74.5" r="1.5"/>
  <rect x="5.5"  y="79" width="2" height="6"/>
  <circle cx="6.5"  cy="77.5" r="1.5"/>
  <!-- Signal lines — right flank (mirror around x=90) -->
  <rect x="160.5" y="72" width="2" height="13"/>
  <circle cx="161.5" cy="70.5" r="1.5"/>
  <rect x="166.5" y="76" width="2" height="9"/>
  <circle cx="167.5" cy="74.5" r="1.5"/>
  <rect x="172.5" y="79" width="2" height="6"/>
  <circle cx="173.5" cy="77.5" r="1.5"/>
</svg>
